NPC_1 - 黑狗:
  基础信息:
    姓名: 黑狗
    年龄: 36岁
    性别: 男
    身份: 流浪者、物资倒卖者
    等级: 三级异能者
    异能: 特殊系（空间感知，能察觉百米内的高阶晶核与大规模尸群）

  外貌特征:
    整体印象: 随身携带超大号战术背包的男人
    关键特征: 左手缺了小指和无名指，常年戴着防毒面具
    穿着风格: 缝补过多次的重型机车皮衣，带钢板的作战靴

  性格核心:
    核心特质: 警觉、利益至上
    行为模式:
      - 交易前拉开五米以上距离
      - 拿到晶核会在刀刃上划一下测硬度
      - 听到枪声第一反应是寻找掩体

  关系定位:
    态度: 只认晶核和原液胶囊，不谈交情
    互动方式: 用物资和情报交换硬通货

  语言特征:
    说话风格: 语速快，声音经过防毒面具过滤显得沉闷
    口头禅: "看货"

  参考语料:
    - "三颗二级，不二价"
    - "看货"
    - "这批胶囊成色太差，我不要"
    - "前面有个小型尸群，消息费一颗一级"
    - "交易结束，往后退"
    - "你的枪不错，卖吗"
