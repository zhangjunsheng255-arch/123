势力名称: 霓虹黑街
势力类型: 地下黑市与情报交易网络

地理与范围:
  势力范围: 天使城废墟市中心地下的废弃地铁系统及防洪排污管网
  核心总部: 位于星光区与中央枢纽站深处的防空防震避难所，被称为“不夜城”
  分散据点:
    - 亚裔街区废弃当铺: 伪装在地表的初级交易点，负责接待生面孔和散客
    - 地铁红线通风井: 隐蔽的走私通道和暗哨，用于运送大宗物资避开地面丧尸
    - 巨蛋体育馆外围台球厅: 雇佣兵和流浪者聚集的情报交换站与悬赏发布地

基础信息:
  主导群体: 幼化后的黑道女性、帮派成员与地下工作者(现为幼女体型)
  外交关系: 绝对中立(认钱不认人)。向黎明要塞出售晶核与情报换取强化液；与流浪者进行武器和物资交易；只要出得起价，连铁壁营地的人也做生意

建筑与防御:
  总部防御: 防空洞防爆门，通道内布满红外线绊雷与自动机枪塔，无熟人引路极易迷失于地下管网
  据点建筑: 外表破败不堪，内部装有大量备用电源和霓虹灯管，充斥着刺目的色彩
  穿搭风格: 极道风格的刺青，改小的特攻服，挂着金属链条的皮夹克，或是传统的黑色和服

重要人物:
  - 姓名: 鬼冢凛
    身份: 黑街主事人/大姐头
    前置职业: 极道家族继承人
    特征: 背后有完整的夜叉纹身，常穿黑色和服，武器是一把武士刀，定居在总部防空洞的最深处
  - 姓名: 艾薇
    身份: 首席情报商兼刺客
    前置职业: 职业杀手
    特征: 脖子上有蛇形刺青，随身携带涂有高阶丧尸毒素的淬毒匕首，常在台球厅据点现身
  - 姓名: 杰西卡
    身份: 财务与物资鉴定师
    前置职业: 地下赌场荷官
    特征: 戴着单片眼镜，手指常把玩几枚高阶晶核，负责评估所有交易物品的价值，过目不忘

具体场景:
  - 名称: 地下拍卖场(位于总部)
    功能: 竞拍稀有高阶晶核、特殊药剂或强力武器的场所
    细节: 环形阶梯座位，中央是防弹玻璃罩住的展示台，四周站满持枪警卫
  - 名称: 悬赏黑板(位于台球厅)
    功能: 发布暗杀、寻物、搜集晶核等任务
    细节: 钉满带血迹的照片和悬赏单，用不同颜色的粉笔标注任务危险等级
  - 名称: 伪装当铺前台(位于废弃当铺)
    功能: 筛选进入地下黑市的资格
    细节: 柜台装有防弹玻璃，接待员脚下有直通地下的逃生滑道和炸药引爆踏板

日常运作:
  据点协同:
    - 地表当铺和台球厅收集到的情报与高价值物资，通过地铁通风井管道迅速转移至地下总部
    - 遭遇丧尸潮或敌人围攻时，直接炸毁地表据点，退守地下管网
  商业模式:
    - 抽取所有交易的20%作为手续费
    - 倒卖黎明要塞的药剂和各种来路不明的武器
  悬赏机制:
    - 任何人均可发布悬赏，黑街提供信誉担保，任务失败不退定金

成员特征:
  幼化前职业: 黑帮成员、杀手、赌场荷官、走私犯
  战斗方式: 擅长暗杀、陷阱布置、下毒，极少进行正面阵地战

内部规则:
  管理制度: 契约精神至上，等价交换
  禁忌: 严禁在黑街据点内私斗，违者没收所有财产并砍断双手扔进丧尸群
