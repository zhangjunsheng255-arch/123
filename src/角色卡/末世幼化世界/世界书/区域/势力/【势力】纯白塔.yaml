势力名称: 纯白塔
势力类型: 医疗与生物科研基地

地理与范围:
  势力范围: 圣弗兰湾区(原旧金山湾区)，以帕罗城(原帕罗奥图)的圣福德医学中心(原斯坦福)为核心
  核心总部: 研究所主楼“白塔”，原临床转化研究大楼，通体覆盖白色反光玻璃
  分散据点:
    - 科技谷街区采血站: 设立在沿海公路边缘的流动献血车或小型诊所，收集流浪者的血液样本
    - 圣何塞废弃制药厂分部: 负责大批量生产基础医疗物资(如绷带、普通消炎药)
    - 柏克莱植物园温室: 培育变异草药与提取特殊植物毒素的封闭种植区
基础信息:
  主导群体: 幼化后的主治医师、外科专家与生物研究员(现为幼女体型)
  外交关系: 孤傲且具备不可替代性。用抗感染血清和高级医疗服务向黎明要塞换取军工防御设备；偶尔从霓虹黑街高价收购稀有高阶晶核；鄙视且拒绝救治铁壁营地的人

建筑与防御:
  总部防御: 建筑外围设有高压电网与紫外线杀菌灯阵列，内部拥有独立的空气净化与内循环系统
  据点建筑: 所有据点必须保持一尘不染，入口处强制设立多重化学喷淋消毒通道
  穿搭风格: 剪裁合身的定制白大褂，内搭无菌手术服，时刻佩戴医用口罩和乳胶手套

重要人物:
  - 姓名: 苏寒
    身份: 纯白塔院长/首席血清专家
    前置职业: 国际顶尖病毒学教授
    特征: 随身携带一台便携式血液分析仪，常年待在白塔顶层的P4级实验室，极度排斥物理接触
  - 姓名: 凯瑟琳
    身份: 外科主刀兼防卫长官
    前置职业: 战地军医
    特征: 习惯将手术刀当作飞刀使用，白大褂下藏着多把经过高温消毒的特制手术刀，负责带领"手术刀小队"处理入侵者
  - 姓名: 艾米丽
    身份: 标本采集主管
    前置职业: 法医
    特征: 总是推着一辆装满福尔马林玻璃罐的恒温推车，眼神狂热，负责解剖高阶丧尸并提取有价值的变异器官

具体场景:
  - 名称: 绝对无菌室(位于总部顶层)
    功能: 研制抗感染血清与存放最核心研究资料的区域
    细节: 进入需经过五道消毒程序，室内完全气密，只有苏寒和少数核心助手拥有进入权限
  - 名称: 隔离病房区(位于总部中层)
    功能: 收治付得起高昂代价的重伤员或感染初期的病患
    细节: 玻璃隔断的独立病房，墙壁铺设隔音海绵，所有送入的食物和水都要经过严格检验
  - 名称: 焚化炉(位于制药厂分部)
    功能: 处理医疗废弃物与失败的实验体
    细节: 24小时运转，烟囱排放出经过二次过滤的高温气体，周围没有任何丧尸敢靠近

日常运作:
  据点协同:
    - 采血站和温室收集到的样本与原料，每天由专用的全封闭冷链车运回总部
    - 一旦某个据点发生生化泄漏或丧尸入侵，会立即启动自毁程序彻底焚烧该区域
  医疗原则:
    - 救治必须支付等价的晶核或稀有物资
    - 拒绝接触任何身上带有污泥或恶臭的伤患
  科研方向:
    - 解析丧尸病毒变异图谱
    - 尝试开发能让人类完美融合高阶晶核的基因药剂

成员特征:
  幼化前职业: 医生、护士、药剂师、生物学家
  战斗方式: 极少使用热兵器，多使用带有高浓度麻醉剂的吹箭、神经毒气手雷或锋利的手术器械

内部规则:
  管理制度: 以学术能力和科研成果决定地位高低
  禁忌: 严禁在规定区域外脱下防护装备，违反卫生条例者会被剥夺研究资格并降级为试药体
