势力名称: 渊巢(统称)
势力类型: 高阶丧尸领主盘踞的独立生态圈

基础概念:
  定义: 并非统一势力，而是指代由拥有完整智慧的高阶丧尸(7-9级领主)所建立的固定盘踞地
  分布: 零星分布于大陆各地，形态各异
  共性: 领主拥有绝对的尸群统御力；领地内存在高浓度的病毒辐射区；极度排斥其他渊巢领主入侵领地

代表性渊巢示例:

  - 渊巢代号: 腐林母巢
    领主等级: 七级(初级领主期)
    地理位置: 原国家公园，被病毒深度侵蚀的千年巨树群中心
    领主特征:
      - 称号: 荆棘之母
      - 形态: 下半身与一棵百米高的变异红杉树融合，无法移动，上半身保留女性轮廓但覆盖藤蔓
      - 智力水平: 拥有领地意识和捕猎本能，懂得布置陷阱
    丧尸种类与生态:
      - 孢子丧尸(变异期): 体表长满毒蘑菇，死亡时会炸开释放致幻毒气
      - 树甲丧尸(强化期): 骨骼与木质化纤维融合，防御力极强，动作迟缓
    运作机制: 利用植物根系感知领地动静，驱使丧尸将猎物拖回母树根部作为养料

  - 渊巢代号: 沉没之城
    领主等级: 八级(中级领主期)
    地理位置: 翡翠海湾废墟，被海啸摧毁并半淹没的残存地标周边
    领主特征:
      - 称号: 深渊暴君
      - 形态: 体型超过五米的类人巨兽，全身覆盖黑色鳞片，能在水下和陆地自由呼吸
      - 智力水平: 具备人类级别的狡诈，懂得利用水域地形伏击，会故意留下活口吸引救援
    丧尸种类与生态:
      - 潜行者(变异期): 四肢退化出蹼，能在浑浊的水中高速移动并将人拖入水下
      - 巨鳃裂兽(强化期): 由大型海洋生物与人类拼凑变异而成，能在浅水区掀起巨浪
    运作机制: 将整座废墟半淹没，利用地下管网和水路进行快速兵力调度，主要收集高阶异能者的血肉

  - 渊巢代号: 机械冢
    领主等级: 九级(巅峰领主期/接近完全体)
    地理位置: 涅瓦达死寂区南部，原“零号黑区”及地下深层的绝密军工试验场
    领主特征:
      - 称号: 铁疫先知
      - 形态: 保持着完美的小女孩人类外貌，但血液为银色液态金属，双眼闪烁数据流光
      - 智力水平: 超越普通人类，掌握旧时代科技知识，试图将丧尸病毒与机械飞升结合
    丧尸种类与生态:
      - 缝合机仆(强化期): 丧尸肉体与报废机械零件强行拼接，手臂被替换为电锯或机枪
      - 辐射核心(领主亲卫): 体内植入微型反应堆的高阶丧尸，死亡时会引发小范围核爆
    运作机制: 驱使尸潮挖掘旧时代矿脉和机械残骸，在地下组装半生化半机械的变异军团

势力关系:
  对人类势力: 视为食物、实验材料或纯粹的清理对象
  渊巢之间: 领地接壤时会发生残酷的尸潮吞噬战，高阶领主会吞噬低阶领主的晶核来进化
