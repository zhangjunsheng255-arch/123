势力名称: 铁壁营地
势力类型: 普通人幸存者基地

地理与范围:
  势力范围: 南部莫尔沙海边缘，维克城市郊
  核心总部: 维克城废弃的大型飞机与汽车联合回收站深处的“钢铁堡垒”
  分散据点:
    - 废土公路加油站: 扼守通往回收站的干线入口，负责收取过路费或劫掠落单者
    - 沙漠边缘烂尾汽车旅馆: 制高点暗哨，负责监视尸群在沙漠公路上的动向
    - 工业废料填埋场分拣站: 深入废墟区的前线据点，负责初步筛选可用的废料

基础信息:
  主导群体: 成年男性幸存者
  外交关系: 恶劣。被各方势力排斥，偶尔与流浪者进行黑市交易，靠打劫弱小幸存者和拾荒维生

建筑与防御:
  总部防御: 外围是由报废汽车压扁后堆叠的三层高墙，墙头布满生锈的铁刺和碎玻璃，入口处设有重力陷阱
  据点建筑: 极其简陋，多为废旧轮胎、沙袋和木板拼凑的掩体
  穿搭风格: 破旧的冲锋衣，用胶带绑着铁片的自制防刺服，沾满机油和血污的工装裤

重要人物:
  - 姓名: 布鲁斯
    身份: 营地首领
    前置职业: 重卡司机
    特征: 脸上有大面积烧伤疤痕，随身携带一把半米长的重型管钳，常驻钢铁堡垒核心区
  - 姓名: 柯林
    身份: 物资分配者兼二把手
    前置职业: 超市库管
    特征: 随身带一个带锁的铁盒子装物资钥匙，负责登记和克扣底层成员的口粮，经常巡视填埋场分拣站
  - 姓名: 疤狗
    身份: 外围劫掠队长
    前置职业: 修理工
    特征: 缺了一只耳朵，擅长制作简易爆炸物，常驻废弃加油站据点

具体场景:
  - 名称: 核心车厢(位于总部)
    功能: 布鲁斯的住所与物资总库
    细节: 由两节冷藏车厢拼接而成，内部铺着发黑的旧床垫，存放着营地七成以上的干净水、食物和武器
  - 名称: 铁笼客车(位于总部)
    功能: 关押与集中管理幼化女性的区域
    细节: 一辆拆除座椅的废弃双层巴士，车窗焊死铁条，车门挂着拇指粗的挂锁，只有布鲁斯和柯林有钥匙
  - 名称: 废油桶掩体(位于废弃加油站)
    功能: 劫掠小队的藏身处
    细节: 埋在地下的储油罐被挖空改造，内部阴暗潮湿，堆放着自制的燃烧瓶和削尖的钢筋

日常运作:
  据点协同:
    - 烂尾楼暗哨发现目标后，通过闪烁手电筒信号通知废弃加油站准备伏击
    - 填埋场分拣站收集到的物资，每晚由人力推车统一运回总部核心区
  防御机制:
    - 遇到小股丧尸用自制长矛捅刺，遇到大股尸群则点燃外围废旧轮胎制造毒烟阻挡
  内部管理:
    - 按劳力分配食物，受伤或生病者会被断绝口粮
    - 发现私藏物资者会被剥光衣服扔出围墙外

成员特征:
  幼化前职业: 工人、司机、销售等各行各业普通人
  战斗方式: 缺乏枪支，多使用自制冷兵器、套索和陷阱，依靠人多势众和地形优势

内部规则:
  管理制度: 粗暴的等级制度，强者为尊
  幼化女性地位: 被视为底层劳动力或发泄工具
