势力名称: 黎明要塞
势力类型: 政府建立的幸存者基地

地理与范围:
  势力范围: 覆盖西海岸北部的圣斯塔雪山及南延至雷登废都的边缘区
  核心总部: 位于圣斯塔雪山深处的冷战时期地下防核地堡
  分散据点:
    - 废弃州际公路收费站: 作为连接雷登废都与山区的初级前哨
    - 气象观测塔: 山区制高点，负责远距离通讯中继与尸潮预警
    - 郊区旧厂房: 资源临时堆放与车队中转站

基础信息:
  主导群体: 幼化后的前政府人员与军警(现为幼女体型)
  外交关系: 中立偏守序。与各方保持距离；用强化液向霓虹黑街换取情报和晶核；对纯白塔的医疗技术保持警惕与竞争关系；遇铁壁营地成员直接射杀

建筑与防御:
  总部防御: 钢筋混凝土厚墙，电子监控网，入口设有三道防爆气密门
  据点建筑: 利用现有建筑加固，外围铺设地雷与铁丝网，配备小型发电机与无线电台
  穿搭风格: 剪裁改小的深色职业套装，迷你版军用迷彩服，配有身份识别金属牌

重要人物:
  - 姓名: 赫尔加
    身份: 要塞最高指挥官
    前置职业: 特种部队教官
    特征: 银色短发，常穿一套改小的战术背心，左眼戴着战术观测镜，随身配有一把定制的微型冲锋枪，驻守总部中央指挥大厅
  - 姓名: 艾琳
    身份: 首席科研官
    前置职业: 军方生物工程博士
    特征: 戴着黑框眼镜，长发盘在脑后，常年待在无菌实验室，随身带着装有不同浓度强化液样品的恒温箱，极少离开总部
  - 姓名: 索菲亚
    身份: 后勤与外交主管
    前置职业: 市政厅高级专员
    特征: 总是穿着整洁的黑色小西装，频繁往返于总部与各边缘据点，手腕处有一道被低级丧尸抓伤但已愈合的疤痕

具体场景:
  - 名称: 总部中央指挥大厅
    功能: 要塞日常运转与全局作战指挥中枢
    细节: 墙上挂满战术地图，实时标记各分散据点的状态灯，中央是大型沙盘，只有佩戴对应权限金属牌的人员才能进入
  - 名称: 地下萃取车间
    功能: 制造觉醒液与强化液的核心区域(位于总部)
    细节: 气温常年保持在10摄氏度以下，摆放着多台利用汽车发动机改装的离心机与提纯设备
  - 名称: 零号哨站
    功能: 规模最大的外围据点
    细节: 由一栋废弃医院改造，停放着三辆加固的越野车，驻扎着两支战术小队，负责接应外出搜集物资的人员

日常运作:
  据点协同:
    - 外围哨站每天定时向总部发送加密的平安电报
    - 搜集小队将物资存放在中转站，由总部的装甲车队定期统一运回
  作息与训练:
    - 实行严格的军事化管理，每天清晨进行体能与战术协同训练
  外出任务:
    - 派遣战术小队以分散据点为跳板，深入城市废墟猎杀变异丧尸获取晶核
  内部管理:
    - 实行积分配给制，完成任务或上交晶核可获取积分，兑换高品质食物与生活用品

成员特征:
  幼化前职业: 公务员，军人，警察，高级科研人员
  特殊能力: 掌握觉醒液与强化液的初期制造技术

内部规则:
  管理制度: 保留末世前的纪律性，层级分明，对擅自脱离据点者执行军法
