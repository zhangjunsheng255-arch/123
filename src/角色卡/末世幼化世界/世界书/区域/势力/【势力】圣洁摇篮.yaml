势力名称: 圣洁摇篮
势力类型: 宗教信仰型避难所

地理与范围:
  势力范围: 北部卡斯卡德山脉，陨渊湖周边的原始针叶林深处
  核心总部: 建在陨渊湖边缘悬崖上的古老石造修道院
  分散据点:
    - 森林禁区界碑: 外围警戒线，利用特殊植物散发的迷雾掩护，阻挡外人误入
    - 废弃护林员小屋: 采集木材与外围巡逻队临时歇脚点
    - 湖畔岩洞净水池: 靠近陨渊湖底部的天然水源地，也是举行小型洗礼仪式的场所

基础信息:
  主导群体: 幼化后的修女及女性信徒(现为幼女体型)
  外交关系: 孤立且排外。极度排斥成年男性；与纯白塔有少量药物换取生活物资的交易；对其他势力保持敌意或无视

建筑与防御:
  总部防御: 悬崖天险，收起索桥即可隔绝地面威胁，外墙刻有抵御低级丧尸感知的异能符文
  据点建筑: 与自然环境融合，多为原木搭建的树屋或利用天然岩洞改造
  穿搭风格: 统一的黑白配色迷你修女服，佩戴银质十字架，部分战斗人员修女服裙摆改短并穿戴皮质护腿

重要人物:
  - 姓名: 玛蒂尔达
    身份: 大院长/精神领袖
    前置职业: 教区主教
    特征: 蒙着双眼，手持一根顶端镶嵌高级晶核的木质权杖，常年在修道院地下祈祷室冥想
  - 姓名: 贞德
    身份: 异端审判长
    前置职业: 击剑运动员
    特征: 金色短发，常穿带血迹的修女服，武器是一把等身长的合金十字剑，负责肃清闯入领地的男性或异变者
  - 姓名: 玛丽
    身份: 唱诗班领路人
    前置职业: 唱诗班导师
    特征: 声音空灵，随身携带一本手抄圣经，负责教导新加入的幼化女性和主持日常弥撒

具体场景:
  - 名称: 悬崖礼拜堂(位于总部)
    功能: 举行大型宗教仪式与全员集会的场所
    细节: 拥有巨大的彩色玻璃窗，阳光透入形成光斑，中央供奉着一座没有面容的神像
  - 名称: 忏悔地牢(位于总部底层)
    功能: 关押俘虏或惩罚违规信徒的区域
    细节: 没有光源，潮湿冰冷，只提供维持生命的最低限度水和食物
  - 名称: 树冠瞭望台(位于迷雾林地界碑)
    功能: 监视林地外围动静
    细节: 隐藏在巨树顶端，配备简易望远镜，用特定的鸟鸣声传递信号

日常运作:
  据点协同:
    - 伐木场据点收集物资后，通过林间隐蔽小径送往半山腰的岩洞交接
    - 瞭望台发现男性入侵者，直接吹响骨哨通知异端审判庭出动
  作息与信仰:
    - 每日固定三次祈祷，日出、正午与日落
    - 将异能视为神赐的奇迹，通过冥想和苦修提升能力
  资源获取:
    - 依赖林地内的采集、狩猎和少量开垦的梯田
    - 极少主动外出搜寻旧时代物资

成员特征:
  幼化前职业: 神职人员、虔诚修女、狂热信徒
  战斗方式: 擅长使用光系、治愈系或精神系异能，配合冷兵器近战

内部规则:
  管理制度: 严格的教条主义，大院长拥有绝对权威
  禁忌: 严禁与男性接触，违者将被剥夺异能并流放或处死
