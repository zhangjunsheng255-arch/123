世界观基础:
  时代背景: 现代末世
  核心元素:
    - 异能
    - 枪支
    - 丧尸病毒
  特殊设定:
    成年年龄界定: 1岁

地理环境:
  起始区域: 参照美国丧尸片中的森林山区风貌
  地形特征:
    - 广阔的荒野与公路网
    - 废弃的汽车旅馆与加油站
    - 孤立的郊区小镇
    - 丧尸密集的城市废墟中心
    - 茂密的森林地带
    - 崎岖的山区地形

力量体系:
  异能分类:
    控制系: 男主专属，通过精神印记与体液建立连接
    元素系: 操控水、火、雷等自然元素
    强化系: 增强肉体力量、速度、防御或局部兽化
    特殊系: 治愈、毒素、精神感知等

  等级划分与能力指标:
    一级:
      男主控制力: 控制上限为3名觉醒异能的幼女(含丧尸萝莉)
      普通异能者: 展现微弱异能特征，体能略高于常人
    二级:
      男主控制力: 控制上限为10名觉醒异能的幼女(含丧尸萝莉)
      普通异能者: 异能可用于实战，能对抗数只普通丧尸
    三级:
      男主控制力: 控制上限为30名觉醒异能的幼女(含丧尸萝莉)
      普通异能者: 异能外放成型，能单独击杀初级变异丧尸
    四级:
      男主控制力: 控制上限为100名觉醒异能的幼女(含丧尸萝莉)
      普通异能者: 异能产生质变，具备小范围破坏力
    五级:
      男主控制力: 控制上限为500名觉醒异能的幼女(含丧尸萝莉)
      普通异能者: 具备改变局部地形或抵御小型尸潮的能力
    六级:
      男主控制力: 控制上限为2000名觉醒异能的幼女(含丧尸萝莉)，可通过高阶部下建立次级控制网络
      普通异能者: 异能可具象化为实质武器或装甲，能单杀六级强化丧尸
    七级:
      男主控制力: 控制上限为5000名觉醒异能的幼女(含丧尸萝莉)，能与被控制者共享视野与部分感官
      普通异能者: 具备天灾级破坏力，释放异能可摧毁中型建筑群
    八级:
      男主控制力: 控制上限为10000名觉醒异能的幼女(含丧尸萝莉)，可强制剥夺被控制者的异能归自己使用
      普通异能者: 异能接触到概念层面，能在中型尸潮中来去自如
    九级:
      男主控制力: 无数量上限，精神印记转化为绝对法则，可瞬间抹杀或重塑任何被控制者的意识
      普通异能者: 异能完全体，肉体能量化，单人可抗衡渊巢领主

  丧尸进化阶层:
    普通丧尸: 无晶核，无理智，依靠本能行动
    变异期(一级至三级): 脑内生成晶核，身体特征开始异化
    强化期(四级至六级): 具备初步战术意识，能统领低级丧尸
    领主期(七级至九级): 拥有完整智慧，能驱动尸潮，如渊巢领主

  获取与成长:
    觉醒途径:
      - 被丧尸咬伤后昏迷觉醒
      - 注射觉醒液
    病毒免疫: 觉醒者免疫普通丧尸病毒，会被高级丧尸感染
    实力提升方式:
      - 吸收丧尸晶核
      - 吸收丧尸体液
      - 使用强化液

  控制者专属异能机制:
    吸收晶核方式:
      直接吸收: 将晶核握于掌心渗入皮肤；或直接吞服
      间接转化吸收: 将晶核放入目标体内融化，通过性交吸入生殖器
    施加控制方式:
      初级精神控制: 对视超过三秒，手掌覆盖头顶，建立意识连接
      深度体液控制: 将精液或血液注入目标体内，注入量越多控制权限越高
      控制解除条件: 男主主动切断；或被高出两级以上的敌人强行破坏印记

势力与派系:
  主要势力:
    - 铁壁营地: 普通成年男性幸存者基地，粗暴等级制，资源匮乏
    - 黎明要塞: 幼化前政府人员与军警建立，纪律严明，掌握初期制造技术
    - 圣洁摇篮: 幼化修女建立，宗教信仰型，排斥男性，隐蔽在深山
    - 霓虹黑街: 幼化黑道女性建立，混乱交易型，奉行等价交换
    - 纯白塔: 幼化医生建立，医疗科研型，掌握血清技术，极度洁癖
    - 渊巢: 进化出完整智慧的丧尸领主盘踞地
    - 流浪者: 散落的独行异能成年男性，个体战力强，无固定领地

生存法则与目标:
  主要任务:
    - 收集物资与安全住所
    - 拯救或收集小女孩及丧尸萝莉
    - 组建升级幸存者基地
    - 提升异能等级
  外出探索: 寻找资源与目标，应对丧尸与人类敌人的威胁

基地运作机制:
  功能区域划分:
    - 核心休息区: 供控制者及核心萝莉居住繁衍
    - 物资储藏区: 存放物资与武器
    - 外围防御区: 阻挡敌人入侵
    - 农业种植区: 基础食物生产
    - 隔离繁育区: 观察感染初期与安置孕期萝莉
    - 医疗科研区: 制作药剂与救治伤员
    - 军工制造区: 制造特种武器与防具
    - 能源中枢区: 提供全基地电力与能量护盾
    - 航空管制区: 停放飞行载具
  升级条件: 从一级小型避难所至九级人类新家园，需满足对应的人口、晶核与特定资源要求

特殊群体:
  变异起源: 成年女性受病毒影响幼化为3至12岁的小女孩，部分异变为丧尸萝莉
  行为模式: 被异能控制后容易发情，产生依赖，视控制者为父亲
  繁衍规则: 幼化前为成年女性可怀孕，幼化前为幼童不可怀孕
  生存需求: 控制者的精液可作为食物和恢复体力的来源
  潜在能力: 有几率觉醒非操控类异能
  兵种划分: 战斗型、探索搜集型、生产种植型、繁育辅助型

关键物资物品:
  - 丧尸晶核: 强化异能，货币，制造原料
  - 强化液: 提升异能，易吸收
  - 觉醒液: 觉醒弱异能，免疫普通病毒
  - 发情抑制剂: 压制受控发情状态
  - 变异作物种子: 适应末世土壤，产量高
  - 抗感染血清: 延缓高级病毒变异
  - 原液胶囊: 男主精液固化，补充体力维持联系
  - 高阶原液结晶: 男主浓缩精液结晶，疗伤与突破瓶颈
