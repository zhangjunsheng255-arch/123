---
变量更新规则:
  # ========== 世界信息 ==========
  时间:
    年:
      type: number
      range: 2026~2030
      check:
        - 仅在剧情跨越整年时更新
        - 每次更新增加1年
    月:
      type: number
      range: 1~12
      check:
        - 每次时间推进超过30天时更新
        - 月份循环，12月之后回到1月
    日:
      type: number
      range: 1~31
      check:
        - 每次事件推进、休息或旅行后更新
        - 根据月份自动调整最大天数
    时:
      type: number
      range: 0~23
      check:
        - 每次行动消耗时间后更新
        - 战斗消耗1~2小时，探索消耗2~4小时，长休息消耗8小时
    分:
      type: number
      range: 0~59
      check:
        - 仅在精确时间场景下更新
        - 通常保持为0
    天气:
      check:
        - 每阶段（清晨/上午/中午/下午/傍晚/夜晚/深夜）开始时随机或根据剧情需要更新
        - 暴雨和沙尘天气会影响视野和行动
    阶段:
      check:
        - 根据当前时间自动更新：清晨(5-7)、上午(8-11)、中午(12-13)、下午(14-17)、傍晚(18-19)、夜晚(20-23)、深夜(0-4)
        - 阶段变化会影响NPC行为和可执行行动

  当前位置:
    区域:
      check:
        - 当主角移动到新区域时更新
        - 区域包括：荒野公路、废弃城区、黎明要塞、铁壁营地、圣洁摇篮、霓虹黑街、纯白塔、渊巢等
    具体地点:
      check:
        - 当主角进入区域内具体地点时更新
        - 如废弃加油站、超市、医院、居民楼等

  # ========== 广播系统 ==========
  广播系统:
    势力广播:
      type: |-
        {
          势力名: string;
          广播内容: string;
        }[]
      check:
        - 当主角进入势力范围或持有接收设备时更新
        - 广播内容包括招募、警告、交易信息等
        - 每条广播应有时间戳，过期后移除
    个人广播:
      type: |-
        {
          发送者: string;
          内容: string;
        }[]
      check:
        - 当主角与其他幸存者建立通讯后接收
        - 内容包括求救、交易请求、情报分享等

  # ========== 主角部分 ==========
  主角:
    人物姓名:
      check:
        - 仅在角色创建时设置，之后不再更新
    人物年龄:
      type: number
      range: 18~60
      check:
        - 仅在角色创建时设置，之后不再更新
    HP:
      当前:
        type: number
        range: 0~主角.HP.上限
        check:
          - 受到伤害时减少，数值等于伤害值
          - 使用药品或休息后恢复
          - 降至0时主角进入濒死状态
      上限:
        type: number
        check:
          - 仅在等级提升或获得特殊装备时增加
          - 每次等级提升增加10~20点
    AP:
      当前:
        type: number
        range: 0~主角.AP.上限
        check:
          - 执行行动时消耗，不同行动消耗不同
          - 普通攻击消耗5点，技能消耗10~20点，休息恢复全部
      上限:
        type: number
        check:
          - 仅在等级提升或获得特殊装备时增加
          - 每次等级提升增加5~10点
    当前等级:
      type: number
      range: 1~9
      check:
        - 累积足够经验值（晶核）后提升
        - 每级需要晶核数量：等级×10
        - 升级时HP和AP上限提升，可能解锁新技能
    晶核数量:
      type: number
      range: 0~
      check:
        - 击败敌人、完成任务、探索发现时获得
        - 用于购买物品、升级基地、提升等级
        - 死亡时损失50%
    当前装备:
      主手:
        check:
          - 装备或卸下武器时更新
          - 影响攻击力和攻击范围
      副手:
        check:
          - 装备盾牌、副武器或道具时更新
          - 可提供额外防御或特殊效果
      头部/上装/下装/腿部/足部:
        check:
          - 穿戴或脱下防具时更新
          - 提供防御力和特殊抗性
      饰品:
        type: string[]
        check:
          - 装备或卸下饰品时添加/移除
          - 最多同时装备3个饰品
          - 提供特殊属性加成或效果
    称号:
      type: string[]
      check:
        - 完成特殊成就或剧情节点时获得
        - 某些称号提供被动加成
        - 同时只能激活一个称号效果

  # ========== 状态 ==========
  状态:
    属性点:
      力量/感知/耐力/魅力/智力/敏捷/幸运:
        type: number
        range: 1~20
        check:
          - 仅在等级提升或使用特殊道具时增加
          - 每次等级提升获得2点可分配属性点
          - 影响战斗、探索、社交等各种检定
    技能:
      type: |-
        {
          名称: string;
          等级: number; // 1~10
          描述: string;
        }[]
      check:
        - 升级、学习技能书或完成训练任务时添加
        - 使用技能提升熟练度，满值后等级提升
        - 战斗技能通过战斗提升，生存技能通过探索提升
    专长:
      type: |-
        {
          名称: string;
          类型: '战斗' | '生存' | '制造' | '社交' | '特殊';
          效果: string;
        }[]
      check:
        - 特定属性达到要求或完成特殊事件时获得
        - 每个专长提供独特效果
        - 专长一旦获得不会消失

  # ========== 背包 ==========
  背包:
    武器:
      type: |-
        {
          名称: string;
          类型: '近战' | '手枪' | '步枪' | '霰弹枪' | '狙击枪' | '特殊';
          品质: '普通' | '精良' | '稀有' | '史诗' | '传说';
          数量: number;
          描述: string;
        }[]
      check:
        - 拾取、购买或制作武器时添加
        - 武器损坏或丢弃时移除
        - 同类武器不可堆叠
    服装:
      type: |-
        {
          名称: string;
          部位: '头部' | '上装' | '下装' | '腿部' | '足部' | '饰品';
          品质: '普通' | '精良' | '稀有' | '史诗' | '传说';
          防御: number;
          数量: number;
          描述: string;
        }[]
      check:
        - 拾取、购买或制作服装时添加
        - 服装破损或丢弃时移除
        - 同类服装可堆叠，最多99个
    药品:
      type: |-
        {
          名称: string;
          类型: '治疗' | '强化' | '解毒' | '抑制' | '特殊';
          效果: string;
          数量: number;
        }[]
      check:
        - 拾取、购买或制作药品时添加
        - 使用或丢弃时减少数量
        - 数量为0时从列表移除
    道具:
      type: |-
        {
          名称: string;
          类型: '材料' | '图纸' | '钥匙' | '任务' | '特殊' | '书籍';
          稀有度: '普通' | '稀有' | '史诗' | '传说';
          数量: number;
          描述: string;
        }[]
      check:
        - 探索、购买或任务奖励时添加
        - 使用、制作消耗或丢弃时减少
        - 任务道具在任务完成后自动移除

  # ========== 基地 ==========
  基地:
    基地等级:
      type: number
      range: 0~9
      check:
        - 消耗晶核和材料升级
        - 每级需要晶核：等级×50
        - 升级解锁新功能区域和幼女上限
    控制统计:
      当前控制幼女总数:
        type: number
        range: 0~基地.控制统计.可控制上限
        check:
          - 成功招募或控制幼女时增加
          - 幼女死亡或叛逃时减少
      可控制上限:
        type: number
        check:
          - 基地等级提升时增加
          - 每级基地等级增加3个上限
    功能区域:
      核心休息区/物资储藏区/外围防御区/农业种植区/隔离繁育区/医疗科研区/能源中枢区/航空管制区:
        等级:
          type: number
          range: 0~9
          check:
            - 消耗资源升级
            - 等级影响区域功能和产出
        已解锁:
          type: boolean
          check:
            - 基地等级达到要求后解锁
            - 解锁后才能使用和升级该区域
    幼女分类与数量:
      战斗型/探索搜集型/生产种植型/繁育辅助型:
        type: number
        range: 0~
        check:
          - 招募对应类型幼女时增加
          - 幼女死亡、转职或释放时减少
          - 不同类型幼女提供不同功能
    任务系统:
      type: |-
        {
          任务名: string;
          任务类型: '主线' | '支线' | '日常' | '紧急' | '委托';
          任务描述: string;
          进度: number; // 0~100
          奖励: string;
          状态: '未接取' | '进行中' | '已完成' | '已放弃';
        }[]
      check:
        - 触发剧情或对话时自动接取主线/支线任务
        - 每日刷新日常任务，最多3个
        - 紧急任务在特定事件后触发，有时限
        - 完成任务目标后进度增加，达到100%可领取奖励
        - 已完成的任务在领取奖励后移除

  # ========== NPC部分 ==========
  NPC列表:
    type: |-
      {
        人物姓名: string;
        人物年龄: number;
        人物穿着: string;
        人物等级: number; // 1~9
        内心想法: string;
        关系: '敌对' | '冷淡' | '中立' | '友好' | '亲密';
      }[]
    check:
      - 遇到新NPC时添加
      - NPC死亡或永久离开剧情时移除
      - 互动、交易或共同战斗后更新关系和内心想法

  # ========== 重要人物部分 ==========
  重要人物列表:
    type: |-
      {
        人物姓名: string;
        人物年龄: number;
        人物穿着: string;
        人物等级: number; // 1~9
        内心想法: string;
        好感度: number; // -100~100
      }[]
    check:
      - 遇到剧情关键人物时添加
      - 重要人物死亡或永久离开剧情时移除
      - 根据互动选择、礼物赠送、任务完成更新好感度
      - 好感度变化范围±(5~20)，重大事件可±30
      - 好感度影响剧情走向和结局

  # ========== 在场人物 ==========
  在场人物:
    type: |-
      {
        人物姓名: string;
        类型: '主角' | '重要人物' | 'NPC' | '敌人' | '中立';
      }[]
    check:
      - 人物进入场景时添加
      - 人物离开场景或死亡时移除
      - 实时反映当前场景中的所有角色
