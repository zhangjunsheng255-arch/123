---
变量更新规则:
  世界:
    时间:
      日期:
        format: YYYY-MM-DD
        check:
          - 经历过夜休息或长时间旅行后推进
      时刻:
        format: HH:MM
        check:
          - 随着剧情中的探索、战斗和对话自然流逝
      天气:
        type: '"晴朗" | "多云" | "阴雨" | "暴雨" | "雾" | "沙尘"'
        check:
          - 根据区域环境或突发事件随机改变，影响探索难度
      阶段:
        type: '"清晨" | "上午" | "中午" | "下午" | "傍晚" | "夜晚" | "深夜"'
        check:
          - 随时刻变化自动对应更新
    当前位置:
      区域:
        check:
          - 跨越大地图移动时更新
      具体地点:
        check:
          - 进入新建筑、废墟、营地或特定地标时更新
  广播系统:
    势力广播:
      type: |-
        {
          [广播频道或势力名: string]: string; // 广播内容
        }
      check:
        - 发生影响末世局势的大事件或特定势力发布通告时更新
    个人广播:
      type: |-
        {
          [广播频道或个人名: string]: string; // 广播内容
        }
      check:
        - 特定求生者或NPC发送全频段求救、交易信息时更新
  主角:
    人物年龄:
      type: number
      range: 18~60
    ${HP|AP}:
      当前:
        type: number
        check:
          - 战斗受伤、执行消耗体力的动作时减少
          - 休息、使用药品或进食后恢复
          - 绝不能超过对应的上限值
      上限:
        type: number
        check:
          - 等级提升、获得特殊强化或装备加成时提升
    当前等级:
      type: number
      range: 1~9
      check:
        - 经验值达到当前等级阈值时提升
    经验值:
      type: number
      check:
        - 击杀变异体、完成任务或达成重要生存里程碑时增加
    晶核数量:
      type: number
      check:
        - 搜刮战利品、击杀特殊感染者或完成交易时增加
        - 购买物资、升级基地设施时减少
    当前装备.${主手|副手|头部|上装|下装|腿部|足部|饰品}:
      check:
        - 主角穿戴、更换或卸下装备时填入具体装备名称，未装备时留空
    称号:
      type: |-
        {
          [称号名: string]: boolean;
        }
      check:
        - 完成特殊成就或在废土中声名远播时获得新称号并设为true
  状态:
    属性点.${力量|感知|耐力|魅力|智力|敏捷|幸运}:
      type: number
      range: 0~100
      check:
        - 升级分配、使用特殊基因血清或遭遇永久性损伤时变动
    ${技能|专长}:
      type: |-
        {
          [名称: string]: {
            描述: string;
          }
        }
      check:
        - 学习新战斗技巧、触发顿悟或获得基因突变时添加
  背包:
    武器:
      type: |-
        {
          [武器名: string]: {
            数量: number;
            类型: "近战" | "远程" | "枪械" | "投掷";
            部位: "主手" | "副手";
            品质: "普通" | "稀有" | "史诗" | "传说";
            描述: string;
            效果: string;
          }
        }
      check:
        - 获得新武器或武器损坏、消耗时更新，数量为0时应自动清理
    装备:
      type: |-
        {
          [装备名: string]: {
            数量: number;
            部位: "头部" | "上装" | "下装" | "腿部" | "足部" | "饰品";
            品质: "普通" | "稀有" | "史诗" | "传说";
            描述: string;
            效果: string;
          }
        }
      check:
        - 搜刮获得或丢弃装备时更新
    药品:
      type: |-
        {
          [药品名: string]: {
            数量: number;
            类型: "恢复" | "增益" | "特殊";
            品质: "普通" | "稀有" | "史诗" | "传说";
            描述: string;
            效果: string;
          }
        }
      check:
        - 搜刮医疗物资或使用消耗时更新
    道具:
      type: |-
        {
          [道具名: string]: {
            数量: number;
            类型: "材料" | "任务" | "消耗" | "杂项";
            品质: "普通" | "稀有" | "史诗" | "传说";
            描述: string;
            效果: string;
          }
        }
      check:
        - 采集废土建材、获得任务物品或消耗材料建设基地时更新
  基地:
    基地等级:
      type: number
      range: 0~9
      check:
        - 满足物资和人员条件，主角决定扩建基地时提升
    控制统计:
      当前控制幼女总数:
        type: number
        check:
          - 成功收容、捕获或失去幼女时更新
      可控制上限:
        type: number
        check:
          - 基地等级提升或扩建特定设施后增加
    功能区域.${核心休息区|物资储藏区|外围防御区|农业种植区|隔离繁育区|医疗科研区|能源中枢区|航空管制区}.已解锁:
      type: boolean
      check:
        - 消耗对应建材和时间完成该区域建设后设为true
    幼女分类与数量.${战斗型幼女|探索搜集型幼女|生产种植型幼女|繁育辅助型幼女}:
      type: number
      check:
        - 对新收容的幼女进行分工安排，或幼女发生伤亡时调整
    任务系统:
      type: |-
        {
          [任务名: string]: {
            类型: "主线" | "支线" | "日常" | "紧急" | "委托";
            描述: string;
            进度: number; // 0~100
            状态: "未接取" | "进行中" | "已完成" | "已放弃";
          }
        }
      check:
        - 触发新危机事件、接取废土委托或任务目标取得进展时更新
  ${NPC列表|重要人物列表}:
    type: |-
      {
        [姓名: string]: {
          好感度: number; // -100~100
          关系: "敌对" | "冷淡" | "中立" | "友好" | "亲密";
        }
      }
    check:
      - 发生重要互动、赠送物资、收容或产生冲突时，根据对方对主角行为的反应调整好感度
      - 好感度跨越特定阈值时，同步更新关系状态
  在场人物:
    type: |-
      {
        [人物姓名: string]: {
          类型: string;
        }
      }
    check:
      - 角色进入或离开当前场景时更新，保持与实际在场人员一致
