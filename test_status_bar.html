<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>状态栏测试</title>
    <style>
        body {
            background: #1a1a1a;
            color: #8BFF8B;
            font-family: 'Share Tech Mono', monospace;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #4a9a4a;
            border-radius: 8px;
        }
        iframe {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/10;
            border: 2px solid #4a9a4a;
            border-radius: 8px;
        }
        .error {
            color: #FF4D4D;
        }
        .success {
            color: #8BFF8B;
        }
    </style>
</head>
<body>
    <h1>状态栏测试页面</h1>
    
    <div class="test-section">
        <h2>测试 1: 直接加载 jsdelivr</h2>
        <iframe src="https://testingcf.jsdelivr.net/gh/zhangjunsheng255-arch/123/dist/角色卡/末世幼化世界/界面/状态栏/index.html"></iframe>
    </div>

    <div class="test-section">
        <h2>测试 2: 加载本地构建文件</h2>
        <iframe src="./dist/角色卡/末世幼化世界/界面/状态栏/index.html"></iframe>
    </div>

    <div class="test-section">
        <h2>排查信息</h2>
        <div id="info"></div>
    </div>

    <script>
        // 显示排查信息
        const info = document.getElementById('info');
        info.innerHTML = `
            <p>当前时间: ${new Date().toLocaleString()}</p>
            <p>jsdelivr URL: <a href="https://testingcf.jsdelivr.net/gh/zhangjunsheng255-arch/123/dist/角色卡/末世幼化世界/界面/状态栏/index.html" target="_blank">点击访问</a></p>
            <p class="success">提示: 如果 jsdelivr 版本不显示，可能是缓存问题，请等待几分钟或添加 ?v=2 参数刷新</p>
        `;

        // 监听 iframe 加载错误
        document.querySelectorAll('iframe').forEach((iframe, index) => {
            iframe.onerror = () => {
                info.innerHTML += `<p class="error">测试 ${index + 1} 加载失败</p>`;
            };
            iframe.onload = () => {
                info.innerHTML += `<p class="success">测试 ${index + 1} 加载完成</p>`;
            };
        });
    </script>
</body>
</html>
